name: assemble
# Reusable workflow: a chapter content repo calls this to build itself against the
# kit, validate, and deploy to its subdomain. Centralizes the build so every chapter
# stays consistent and guarded — a chapter can only ever publish its own folder.
#
# Called from a chapter repo's .github/workflows/deploy.yml:
#   permissions: { id-token: write, contents: read }
#   jobs:
#     ship:
#       uses: lunatechs-social/lunatechs-chapterkit/.github/workflows/assemble.yml@main
#       with:  { slug: singapore }
#       secrets: inherit
on:
  workflow_call:
    inputs:
      slug:
        description: chapter slug (its folder + subdomain prefix)
        required: true
        type: string
    secrets:
      AWS_ROLE_ARN:       { required: true }
      CHAPTER_BUCKET:     { required: true }
      CLOUDFRONT_DIST_ID: { required: true }

jobs:
  assemble:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # for AWS OIDC
      contents: read
    steps:
      - name: Checkout chapter content
        uses: actions/checkout@v4
        with: { path: content }
      - name: Checkout the chapter kit
        uses: actions/checkout@v4
        with:
          repository: lunatechs-social/lunatechs-chapterkit
          path: kit
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Assemble (drop content into the kit) + build + validate
        run: |
          mkdir -p "kit/${{ inputs.slug }}"
          rsync -a --exclude '.git' --exclude '.github' --exclude '.chapterkit' content/ "kit/${{ inputs.slug }}/"
          cd kit
          node scripts/build.mjs
          node scripts/validate.mjs
          echo "Built dist/${{ inputs.slug }}"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy to the chapter's subdomain prefix + invalidate
        env:
          BUCKET:  ${{ secrets.CHAPTER_BUCKET }}      # lunatechs-chapters
          DIST_ID: ${{ secrets.CLOUDFRONT_DIST_ID }}  # E145GHOJCOZOLP
        run: |
          HOST=$(node -p "require('./content/chapter.json').subdomain")
          aws s3 sync "kit/dist/${{ inputs.slug }}/" "s3://$BUCKET/$HOST/" --delete --cache-control "public, max-age=300"
          aws cloudfront create-invalidation --distribution-id "$DIST_ID" --paths "/$HOST/*"
          echo "deployed → https://$HOST/"
      - name: Health check
        run: |
          HOST=$(node -p "require('./content/chapter.json').subdomain")
          sleep 10
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://$HOST/")
          echo "$HOST -> $code"; [ "$code" = "200" ] || { echo "::error::unhealthy"; exit 1; }
