# Gated drafts — add these two blocks inside the server{} of BOTH the
# `lunatechs-chapters` vhost (serves hk/sg/la from /var/www/chapters/<slug>/) and
# the `lunatechs.social` vhost (serves /var/www/hanley.world/lunatechs/).
#
# /_drafts/events.json is written by the build (per chapter) and by
# gen-global-events.mjs (the merged global feed). It contains unpublished events, so
# it is ONLY ever served when draft-auth.mjs approves the caller (organizer/leader of
# this chapter, or admin). Everyone else gets 401/403 and never sees a draft.

# internal subrequest target — checks the lt_id cookie against the app API
location = /_draft_auth {
    internal;
    proxy_pass              http://127.0.0.1:9002/check;
    proxy_pass_request_body off;
    proxy_set_header        Content-Length "";
    proxy_set_header        X-Original-Host  $host;     # draft-auth maps host -> chapter
    proxy_set_header        Cookie           $http_cookie;
}

# the gated feed itself — only reachable when /_draft_auth returns 2xx
location /_drafts/ {
    auth_request /_draft_auth;
    add_header   Cache-Control "no-store" always;
    # files served from this vhost's existing root (…/<slug>/_drafts/ or …/lunatechs/_drafts/)
}
