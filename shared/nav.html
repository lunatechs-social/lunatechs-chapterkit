<!-- Shared CHAPTER nav — local-first. Core-team owned; the build inlines it.
     Brand + Events/About/Contact jump to THIS chapter's own sections; the only
     outbound link is "Global ↗" back to the worldwide site. Anchor contract:
     your page must have id="events", id="about", id="connect" sections (the
     starter ships them). Set <body data-city="Your City"> to show the city chip. -->
<header class="site-header">
  <a href="/" class="site-header-brand" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
    <img src="https://lunatechs.social/brand/mascot-head.png" alt="" style="height:24px;" />
    <span class="site-header-wordmark" style="font-family:'JetBrains Mono',monospace; font-size:18px; font-weight:800; letter-spacing:-0.02em;"><span style="color:var(--text)">luna</span><span style="color:var(--cyan)">techs</span></span>
    <span class="nav-city" aria-hidden="true"></span>
  </a>
  <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="primary-nav">
    <span class="nav-toggle-bars"><span></span><span></span><span></span></span>
  </button>
  <nav class="site-header-nav" id="primary-nav">
    <a href="#events" aria-label="Events"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-1V2h-2v2H8V2H6v2H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg><span class="nav-label">Events</span></a>
    <a href="#about" aria-label="About"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg><span class="nav-label">About</span></a>
    <a href="#connect" aria-label="Contact"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3.5 7.5l8.5 6 8.5-6"/></svg><span class="nav-label">Contact</span></a>
    <a class="nav-global" href="https://lunatechs.social/global/" aria-label="LunaTechs Global"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 100 20 10 10 0 000-20zm6.93 6h-2.95a15.7 15.7 0 00-1.38-3.56A8.03 8.03 0 0118.93 8zM12 4c.83 1.2 1.48 2.53 1.91 4h-3.82c.43-1.47 1.08-2.8 1.91-4zM4.26 14a7.96 7.96 0 010-4h3.38a16.6 16.6 0 000 4H4.26zm.81 2h2.95c.32 1.25.79 2.45 1.38 3.56A8.03 8.03 0 015.07 16zm2.95-8H5.07a8.03 8.03 0 014.33-3.56A15.7 15.7 0 008.02 8zM12 20c-.83-1.2-1.48-2.53-1.91-4h3.82A13.5 13.5 0 0112 20zm2.34-6H9.66a14.7 14.7 0 010-4h4.68a14.7 14.7 0 010 4zm.27 5.56c.59-1.11 1.06-2.31 1.38-3.56h2.95a8.03 8.03 0 01-4.33 3.56zM16.36 14a16.6 16.6 0 000-4h3.38a7.96 7.96 0 010 4h-3.38z"/></svg><span class="nav-label">Global ↗</span></a>
  </nav>
</header>
<style>
  .site-header{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(6,8,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,rgba(56,189,248,.14))}
  .site-header-nav{display:flex;gap:16px;align-items:center}
  .site-header-nav a{font-size:13px;font-weight:600;color:var(--text-secondary,#94a3b8);text-decoration:none;transition:color .2s}
  .site-header-nav a:hover{color:var(--cyan,#22d3ee)}
  .site-header-nav a{display:inline-flex;align-items:center;gap:4px}
  .site-header-nav .nav-label{white-space:nowrap}
  /* city chip next to the wordmark */
  .nav-city{display:none;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold,#fbbf24);line-height:1.4}
  .nav-city.show{display:inline-block}
  /* the one outbound link — set apart with a divider + dimmer treatment */
  .site-header-nav .nav-global{margin-left:6px;padding-left:16px;border-left:1px solid var(--border,rgba(56,189,248,.14));color:var(--text-dim,#64748b)}
  .site-header-nav .nav-global:hover{color:var(--cyan,#22d3ee)}

  /* Hamburger button — hidden on desktop, shown on mobile */
  .nav-toggle{display:none;width:40px;height:40px;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border-bright);border-radius:10px;cursor:pointer;padding:0}
  .nav-toggle-bars{position:relative;width:18px;height:14px}
  .nav-toggle-bars span{position:absolute;left:0;width:100%;height:2px;border-radius:2px;background:var(--text);transition:transform .25s ease,opacity .2s ease,top .25s ease}
  .nav-toggle-bars span:nth-child(1){top:0}
  .nav-toggle-bars span:nth-child(2){top:6px}
  .nav-toggle-bars span:nth-child(3){top:12px}
  .site-header.nav-open .nav-toggle-bars span:nth-child(1){top:6px;transform:rotate(45deg)}
  .site-header.nav-open .nav-toggle-bars span:nth-child(2){opacity:0}
  .site-header.nav-open .nav-toggle-bars span:nth-child(3){top:6px;transform:rotate(-45deg)}

  /* Mobile: collapse links into a popup menu under the hamburger */
  @media (max-width:600px){
    .nav-toggle{display:inline-flex}
    .site-header-nav{display:none;position:absolute;top:calc(100% + 10px);right:12px;flex-direction:column;align-items:stretch;gap:2px;min-width:210px;padding:8px;background:rgba(12,17,32,.98);backdrop-filter:blur(14px);border:1px solid var(--border-bright);border-radius:14px;box-shadow:0 18px 44px rgba(0,0,0,.55)}
    .site-header.nav-open .site-header-nav{display:flex}
    .site-header.nav-open .site-header-nav a{display:inline-flex !important}
    .site-header.nav-open .site-header-nav a svg{display:inline-block !important}
    .site-header.nav-open .site-header-nav .nav-label{display:inline !important}
    .site-header-nav a{width:100%;padding:11px 14px !important;border-radius:10px;font-size:15px !important;gap:13px !important}
    .site-header-nav a svg{display:inline-block !important;width:18px !important;height:18px !important;flex-shrink:0;opacity:.85}
    .site-header-nav .nav-label{display:inline !important}
    .site-header-nav a:hover,.site-header-nav a:active{background:rgba(255,255,255,.06)}
    /* on mobile the outbound link sits in the stack — divider becomes a top border */
    .site-header-nav .nav-global{margin-left:0;padding-left:14px !important;border-left:none;margin-top:4px;border-top:1px solid var(--border)}
  }
</style>
<script>
  (function () {
    var header = document.querySelector('.site-header');
    if (!header || header.dataset.navInit) return;
    header.dataset.navInit = '1';
    // city chip from <body data-city="...">
    var city = document.body && document.body.dataset ? document.body.dataset.city : '';
    var chip = header.querySelector('.nav-city');
    if (chip && city) { chip.textContent = city; chip.classList.add('show'); }
    var toggle = header.querySelector('.nav-toggle');
    var nav = header.querySelector('.site-header-nav');
    if (!toggle || !nav) return;
    function setOpen(open){header.classList.toggle('nav-open',open);toggle.setAttribute('aria-expanded',open?'true':'false');}
    toggle.addEventListener('click',function(e){e.stopPropagation();setOpen(!header.classList.contains('nav-open'));});
    nav.addEventListener('click',function(e){if(e.target.closest('a'))setOpen(false);});
    document.addEventListener('click',function(e){if(header.classList.contains('nav-open')&&!header.contains(e.target))setOpen(false);});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')setOpen(false);});
  })();
</script>
