<!-- Shared PARTNERS module — core-team owned; the build inlines it. Renders THIS
     chapter's own partners from /partners.json (each chapter ships its own list +
     its logo files under /partners/). Self-hides when partners.json is missing or
     empty, so a chapter with no partners yet shows nothing.
     partners.json shape:
       { "items": [
           { "name": "The Hive", "logo": "partners/the-hive.png",
             "url": "https://thehive.com", "square": false, "light": false }
       ] }
     - logo: path relative to the chapter root (served from /partners/, NOT /assets/
       which falls back to the global site).
     - square: true for ~1:1 marks (renders a smaller, rounded tile).
     - light: true for dark logos that need a white chip to read on the dark page. -->
<section class="section partners-section" id="partners" hidden>
  <div class="container">
    <span class="section-label">Partners</span>
    <h2 class="section-title">Partners We&rsquo;ve Worked With</h2>
    <p class="section-desc">Venues, sponsors and co-hosts who help make this chapter real.</p>
    <div class="partners-grid" aria-label="Partner logos"></div>
  </div>
</section>
<style>
  /* Connected logo grid — matches the global site: one bordered box, internal
     hairlines (drawn by the 1px gap showing the grid's background), big logos,
     tall cells. Column count + any ragged-row fillers are set by JS so it stays
     a clean rectangle at ANY partner count (1, 6, or 7). */
  .partners-section .partners-grid{display:grid;gap:1px;margin:30px auto 0;background:var(--border,rgba(56,189,248,.14));border:1px solid var(--border,rgba(56,189,248,.14));border-radius:18px;overflow:hidden}
  .partners-section .partner-logo-card{min-height:170px;padding:30px 28px;display:flex;align-items:center;justify-content:center;background:#0c1322;transition:background .2s ease;text-decoration:none}
  .partners-section .partner-logo-card:not(.is-filler):hover{background:#141d30}
  .partners-section .partner-logo-card img{display:block;width:100%;max-width:240px;max-height:108px;object-fit:contain}
  .partners-section .partner-logo-card.is-square img{max-width:128px;max-height:128px;border-radius:12px}
  /* dark logos (e.g. university wordmarks) on a white chip so they read */
  .partners-section .partner-logo-card.is-light{background:#fff}
  .partners-section .partner-logo-card.is-light:hover{background:#f3f4f6}
  .partners-section .partner-logo-card.is-filler{pointer-events:none}
  @media (max-width:560px){ .partners-section .partner-logo-card{min-height:120px;padding:18px} .partners-section .partner-logo-card img{max-height:64px} }
</style>
<script>
  (async function () {
    var sec = document.getElementById('partners');
    if (!sec) return;
    var grid = sec.querySelector('.partners-grid');
    function esc(s){ return String(s == null ? '' : s).replace(/[&<>"]/g, function(c){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]; }); }
    try {
      var res = await fetch('/partners.json', { cache: 'no-cache' });
      if (!res.ok) return;                      // no partners file -> stay hidden
      var data = await res.json();
      var items = (data.items || []).filter(function (p) { return p && p.logo; });
      if (!items.length) return;                // empty -> stay hidden
      var html = items.map(function (p) {
        var cls = 'partner-logo-card' + (p.square ? ' is-square' : '') + (p.light ? ' is-light' : '');
        var src = p.logo.charAt(0) === '/' ? p.logo : '/' + p.logo;
        var img = '<img src="' + esc(src) + '" alt="' + esc(p.name) + '" loading="lazy">';
        return p.url
          ? '<a class="' + cls + '" href="' + esc(p.url) + '" target="_blank" rel="noopener" aria-label="' + esc(p.name) + '">' + img + '</a>'
          : '<div class="' + cls + '">' + img + '</div>';
      }).join('');
      // pick columns that fill cleanly, then pad the last row with invisible
      // filler tiles so the connected box is always a perfect rectangle.
      var n = items.length;
      var cols = n <= 3 ? n : (n === 4 ? 2 : 3);
      var blanks = (cols - (n % cols || cols)) % cols;
      for (var i = 0; i < blanks; i++) html += '<div class="partner-logo-card is-filler" aria-hidden="true"></div>';
      grid.innerHTML = html;
      grid.style.gridTemplateColumns = 'repeat(' + cols + ', minmax(0, 1fr))';
      grid.style.maxWidth = (cols * 300) + 'px';
      sec.hidden = false;
    } catch (e) { /* stay hidden on error */ }
  })();
</script>
